name: Deploy a producción

# Solo en push a main (o manual). No en cualquier branch.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos mínimos del GITHUB_TOKEN.
permissions:
  contents: read

# Evita que dos deploys corran a la vez pisándose.
concurrency:
  group: deploy-produccion
  cancel-in-progress: false

jobs:
  # -------- CI: compila y publica el dist como artifact --------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      # Instala TODO desde el lockfile (incluye devDeps: Tailwind/Drizzle/sharp)
      # y compila. Si la build falla, el deploy no corre (needs: build).
      - name: Instalar dependencias
        run: npm ci

      - name: Compilar (build)
        run: npm run build

      - name: Publicar dist como artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 3
          if-no-files-found: error

  # -------- CD: sube el dist al servidor y reinicia --------
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production # permite protection rules / required reviewers en la UI
    steps:
      - name: Checkout (para package.json / package-lock.json)
        uses: actions/checkout@v4

      - name: Descargar dist compilado
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # La clave privada se guarda en el Secret en base64 (una sola línea, así
      # no se corrompe al copiar). Se decodifica a un archivo; el valor nunca se
      # imprime en el log (el echo va a un pipe, no a stdout).
      - name: Preparar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # El servidor no tiene rsync → tar sobre SSH. Se respalda el dist actual en
      # dist.bak (para rollback) antes de reemplazarlo. NO toca uploads/ ni .env.
      - name: Subir build al servidor
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd ${{ secrets.DEPLOY_PATH }} && rm -rf dist.bak && { [ -d dist ] && mv dist dist.bak || true; }"
          tar czf - dist package.json package-lock.json | \
            ssh -i ~/.ssh/id_deploy -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd ${{ secrets.DEPLOY_PATH }} && tar xzf -"

      # npm ci SOLO si cambió el lockfile (comparando un hash guardado). Si no
      # cambió, se omite → rápido y sin redescargar sharp. Luego reinicia.
      - name: Instalar deps de producción y reiniciar
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            source /home/fade/nodevenv/fadeing/24/bin/activate &&
            cd ${{ secrets.DEPLOY_PATH }} &&
            NEW=\$(md5sum package-lock.json | cut -d' ' -f1) &&
            OLD=\$(cat .deploy-lock-hash 2>/dev/null || echo none) &&
            if [ \"\$NEW\" != \"\$OLD\" ]; then echo 'Lockfile cambió → npm ci --omit=dev'; npm ci --omit=dev && echo \"\$NEW\" > .deploy-lock-hash; else echo 'Dependencias sin cambios → se omite npm ci'; fi &&
            mkdir -p tmp && touch tmp/restart.txt
          "

      # Health check: espera hasta ~60s a que la app responda 200. Si no, falla
      # el job (y dispara el rollback del paso siguiente).
      - name: Health check
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://fadeingenieria.com.ar/ || echo 000)
            if [ "$code" = "200" ]; then echo "✓ App respondió 200 (intento $i)"; exit 0; fi
            echo "Intento $i: HTTP $code — reintento en 5s"
            sleep 5
          done
          echo "✗ La app no respondió 200 tras el deploy"
          exit 1

      # Rollback: si algún paso anterior falló (p. ej. health check), restaura el
      # dist anterior (dist.bak) y reinicia.
      - name: Rollback si el deploy falló
        if: failure()
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd ${{ secrets.DEPLOY_PATH }} && if [ -d dist.bak ]; then rm -rf dist && mv dist.bak dist && mkdir -p tmp && touch tmp/restart.txt && echo 'Rollback aplicado'; else echo 'Sin backup para rollback'; fi"

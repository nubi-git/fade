name: Deploy a producción

# Se dispara en cada push a main (o manualmente desde la pestaña Actions).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita que dos deploys corran a la vez pisándose.
concurrency:
  group: deploy-produccion
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      # Instala TODAS las dependencias (incluye devDeps: Tailwind/Drizzle) y
      # compila. Si la build falla, el deploy no continúa (actúa como test).
      - name: Instalar dependencias
        run: npm ci

      - name: Compilar (build)
        run: npm run build

      # La clave privada se guarda en el Secret codificada en base64 (una sola
      # línea, así no se corrompe al copiar). Acá la decodificamos a un archivo.
      - name: Preparar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # El servidor no tiene rsync, así que empaquetamos con tar y lo mandamos
      # por SSH. Primero borramos el dist/ viejo (limpieza), luego extraemos el
      # nuevo. Solo toca dist/ y los package*.json; NO toca uploads/ ni .env.
      - name: Subir build al servidor
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "rm -rf '${{ secrets.DEPLOY_PATH }}/dist'"
          tar czf - dist package.json package-lock.json | \
            ssh -i ~/.ssh/id_deploy -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd '${{ secrets.DEPLOY_PATH }}' && tar xzf -"

      # En el servidor: instala solo deps de producción (liviano, sin OOM) y
      # reinicia la app de Passenger tocando tmp/restart.txt.
      - name: Instalar deps de producción y reiniciar
        run: |
          ssh -i ~/.ssh/id_deploy -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "source /home/fade/nodevenv/fadeing/24/bin/activate && cd ${{ secrets.DEPLOY_PATH }} && npm ci --omit=dev && mkdir -p tmp && touch tmp/restart.txt"
